<style>
:root {
  --bg: #0D1117; --card: #161B22; --border: #21262D; --text: #E6EDF3;
  --text-muted: #8B949E; --text-dim: #484F58;
  --green: #107C10; --green-light: #10893E; --lime: #7FBA00;
  --blue: #0078D4; --purple: #7B68EE; --orange: #FF8C00;
  --red: #E81123; --gold: #FFB900;
  --halo: #00A4EF; --forza: #FF6B00; --cod: #556B2F;
  --minecraft: #5D8C3E; --sot: #DAA520; --starfield: #6B5B95;
  --gears: #DC143C;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
/* ── Header ── */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(135deg,#0D1117 0%,#161B22 100%);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px}
.header .logo{font-size:20px;font-weight:800;color:#fff;display:flex;align-items:center;gap:10px}
.header .logo span{color:var(--green)}
.header .subtitle{color:var(--text-muted);font-size:13px;font-weight:400;margin-left:4px}
.header .badge{margin-left:auto;background:var(--green);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px}
.header .ts{color:var(--text-dim);font-size:11px;margin-left:12px}

/* ── Tab Bar ── */
.tab-bar{position:fixed;top:56px;left:0;right:0;z-index:99;background:#0f1318;border-bottom:2px solid var(--border);display:flex;align-items:stretch;padding:0 12px;height:48px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{display:flex;align-items:center;gap:7px;padding:0 18px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text-muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s ease;position:relative}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.tab-btn.active{color:#fff;border-bottom-color:var(--tab-color,var(--green))}
.tab-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--tab-color,var(--green));opacity:.6;transition:opacity .2s}
.tab-btn.active .dot{opacity:1;box-shadow:0 0 8px var(--tab-color,var(--green))}
.tab-btn .icon{font-size:16px}

/* ── Main Content ── */
.main{margin-top:106px;padding:20px 24px 40px}

/* Tab Panels */
.tab-panel{display:none;animation:fadeIn .35s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Section titles */
.section-title{font-size:14px;font-weight:700;color:var(--text);margin:28px 0 14px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.5px}
.section-title::before{content:'';width:4px;height:18px;border-radius:2px;background:var(--accent,var(--green))}
.section-title:first-child{margin-top:0}

/* ── KPI Tiles ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px}
.kpi-tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.kpi-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--green))}
.kpi-tile .label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-tile .value{font-size:28px;font-weight:800;color:#fff;line-height:1.1}
.kpi-tile .delta{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;margin-top:6px;padding:2px 8px;border-radius:6px}
.kpi-tile .delta.up{color:#3fb950;background:rgba(63,185,80,.12)}
.kpi-tile .delta.down{color:var(--red);background:rgba(232,17,35,.12)}
.kpi-tile .sub{font-size:11px;color:var(--text-dim);margin-top:4px}

/* ── Charts Grid ── */
.chart-grid{display:grid;gap:14px;margin-bottom:8px}
.chart-grid.g2{grid-template-columns:repeat(2,1fr)}
.chart-grid.g3{grid-template-columns:repeat(3,1fr)}
.chart-grid.g23{grid-template-columns:2fr 1fr}
.chart-grid.g32{grid-template-columns:3fr 2fr}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative}
.chart-card .card-title{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.3px}
.chart-card canvas{width:100%!important}

/* ── Funnel ── */
.funnel-wrap{display:flex;align-items:center;gap:0;justify-content:center;padding:12px 0}
.funnel-step{text-align:center;position:relative;flex:1;max-width:160px}
.funnel-bar{margin:0 auto 8px;border-radius:8px;background:var(--accent,var(--green));opacity:.85;transition:all .3s}
.funnel-step .f-val{font-size:18px;font-weight:800;color:#fff}
.funnel-step .f-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.funnel-step .f-pct{font-size:11px;color:var(--accent,var(--green));font-weight:700;margin-top:2px}
.funnel-arrow{color:var(--text-dim);font-size:18px;margin:0 -4px;flex-shrink:0}

/* ── Segments ── */
.seg-bars{display:flex;gap:10px;align-items:flex-end;justify-content:center;padding:20px 0 8px}
.seg-col{text-align:center}
.seg-col .bar{width:56px;border-radius:6px 6px 0 0;margin:0 auto 6px;min-height:8px;transition:height .4s}
.seg-col .s-pct{font-size:14px;font-weight:700;color:#fff}
.seg-col .s-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-top:2px}

/* ── Responsive ── */
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(2,1fr)}.chart-grid.g2,.chart-grid.g3,.chart-grid.g23,.chart-grid.g32{grid-template-columns:1fr}}
@media(max-width:700px){.kpi-row{grid-template-columns:1fr}.tab-btn{padding:0 12px;font-size:12px}}
</style>
</head>

const main = document.getElementById('mainContent');

GAMES.forEach((g,i)=>{
  // Tab button
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i===0?' active':'');
  btn.style.setProperty('--tab-color', g.color);
  btn.innerHTML = `<span class="icon">${g.icon}</span><span class="dot" style="background:${g.color}"></span>${g.name}`;
  btn.onclick = () => switchTab(g.id);
  btn.dataset.tab = g.id;
  tabBar.appendChild(btn);

  // Panel
  const panel = document.createElement('div');
  panel.className = 'tab-panel' + (i===0?' active':'');
  panel.id = 'panel-'+g.id;
  panel.innerHTML = buildPanel(g);
  main.appendChild(panel);
});

function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.tab-panel').forEach(p=>{
    const isActive = p.id==='panel-'+id;
    p.classList.toggle('active',isActive);
  });
  // Lazy-render charts
  setTimeout(()=>renderCharts(id),60);
}

function buildPanel(g){
  const accentCSS = `--accent:${g.color}`;
  const funnelLabels = ['Installs','1st Session','D1 Return','D7 Return','D14 Return','D30 Return'];
  const funnelHTML = g.funnel.map((v,i)=>{
    const pct = i===0?'100%': (v/g.funnel[0]*100).toFixed(0)+'%';
    const h = 12 + (v/g.funnel[0])*80;
    const w = 40 + (v/g.funnel[0])*60;
    const arrow = i<g.funnel.length-1?`<span class="funnel-arrow">→</span>`:'';
    const fmt = v>=1? (v>=100?v.toFixed(0)+'M':v.toFixed(1)+'M') : (v*1000).toFixed(0)+'K';
    return `<div class="funnel-step"><div class="funnel-bar" style="width:${w}%;height:${h}px;background:${g.color}"></div><div class="f-val">${fmt}</div><div class="f-label">${funnelLabels[i]}</div><div class="f-pct" style="color:${g.color}">${pct}</div></div>${arrow}`;
  }).join('');

  const segColors = {casual:'#49CCF9',core:'#7FBA00',hardcore:'#FF8C00'};
  const segHTML = Object.entries(g.segments).map(([k,v])=>{
    const h = v*2.2;
    return `<div class="seg-col"><div class="bar" style="height:${h}px;background:${segColors[k]}"></div><div class="s-pct">${v}%</div><div class="s-label">${k}</div></div>`;
  }).join('');

  return `
  <div style="${accentCSS}">
    <!-- KPIs -->
    <div class="section-title" style="${accentCSS}">Key Performance Indicators</div>
    <div class="kpi-row">
      <div class="kpi-tile" style="${accentCSS}"><div class="label">Monthly Active Users</div><div class="value">${g.mau}</div><div class="delta up">▲ ${g.mauDelta}</div><div class="sub">vs. prior year</div></div>
      <div class="kpi-tile" style="${accentCSS}"><div class="label">Avg Min / Day</div><div class="value">${g.minPerDay}</div><div class="delta up">▲ ${g.minDelta}</div><div class="sub">engagement depth</div></div>
      <div class="kpi-tile" style="${accentCSS}"><div class="label">Revenue (MTX+DLC)</div><div class="value">${g.revenue}</div><div class="delta up">▲ ${g.revDelta}</div><div class="sub">trailing 12 months</div></div>
      <div class="kpi-tile" style="${accentCSS}"><div class="label">M3 Retention</div><div class="value">${g.retention}</div><div class="delta up">▲ ${g.retDelta}</div><div class="sub">3-month cohort</div></div>
    </div>

    <!-- Funnel -->
    <div class="section-title" style="${accentCSS}">Player Funnel</div>
    <div class="chart-card"><div class="funnel-wrap">${funnelHTML}</div></div>

    <!-- Engagement -->
    <div class="section-title" style="${accentCSS}">Engagement Trends (12 Mo)</div>
    <div class="chart-grid g2">
      <div class="chart-card"><div class="card-title">MAU & DAU</div><canvas id="ch-maudau-${g.id}" height="220"></canvas></div>
      <div class="chart-card"><div class="card-title">Avg Minutes Played / Day</div><canvas id="ch-min-${g.id}" height="220"></canvas></div>
    </div>

    <!-- Monetization -->
    <div class="section-title" style="${accentCSS}">Monetization</div>
    <div class="chart-grid g2">
      <div class="chart-card"><div class="card-title">Revenue & ARPU</div><canvas id="ch-rev-${g.id}" height="220"></canvas></div>
      <div class="chart-card"><div class="card-title">MTX Conversion & DLC Attach</div><canvas id="ch-mtx-${g.id}" height="220"></canvas></div>
    </div>

    <!-- Retention -->
    <div class="section-title" style="${accentCSS}">Retention Cohort Curves</div>
    <div class="chart-grid g23">
      <div class="chart-card"><div class="card-title">Retention by Day</div><canvas id="ch-ret-${g.id}" height="220"></canvas></div>
      <div class="chart-card"><div class="card-title">D30 Benchmarks</div><canvas id="ch-retbar-${g.id}" height="220"></canvas></div>
    </div>

    <!-- Segments & Platform -->
    <div class="section-title" style="${accentCSS}">Player Segments & Platform Split</div>
    <div class="chart-grid g2">
      <div class="chart-card"><div class="card-title">Casual / Core / Hardcore</div><div class="seg-bars">${segHTML}</div></div>
      <div class="chart-card"><div class="card-title">Platform Distribution</div><canvas id="ch-plat-${g.id}" height="200"></canvas></div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// CHART RENDERING
// ═══════════════════════════════════════════
const chartInstances = {};

function getCtx(id){
  const el = document.getElementById(id);
  return el ? el.getContext('2d') : null;
}

function destroyChart(id){
  if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}
}

function makeGrad(ctx, color, alpha1=.35, alpha2=.0){
  const g=ctx.createLinearGradient(0,0,0,220);
  g.addColorStop(0, color.replace(')',`,${alpha1})`).replace('rgb','rgba').replace('#',''));
  // simple hex to rgba
  const r=parseInt(color.slice(1,3),16),gr=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  const g2=ctx.createLinearGradient(0,0,0,220);
  g2.addColorStop(0,`rgba(${r},${gr},${b},${alpha1})`);
  g2.addColorStop(1,`rgba(${r},${gr},${b},${alpha2})`);
  return g2;
}

function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

function renderCharts(gameId){
  const g = GAMES.find(x=>x.id===gameId);
  if(!g) return;

  // MAU/DAU
  const mauId = 'ch-maudau-'+g.id;
  destroyChart(mauId);
  const mauCtx = getCtx(mauId);
  if(mauCtx){
    chartInstances[mauId] = new Chart(mauCtx,{
      type:'line',
      data:{
        labels:MONTHS,
        datasets:[
          {label:'MAU (M)',data:g.mauTrend,borderColor:g.color,backgroundColor:makeGrad(mauCtx,g.color),fill:true},
          {label:'DAU (M)',data:g.dauTrend,borderColor:hexToRgba(g.color,.55),borderDash:[4,3],fill:false}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{datalabels:{display:false},legend:{position:'top'}},scales:{y:{beginAtZero:false}}}
    });
  }

  // Minutes
  const minId = 'ch-min-'+g.id;
  destroyChart(minId);
  const minCtx = getCtx(minId);
  if(minCtx){
    chartInstances[minId] = new Chart(minCtx,{
      type:'bar',
      data:{labels:MONTHS,datasets:[{label:'Avg Min/Day',data:g.minTrend,backgroundColor:hexToRgba(g.color,.65),borderColor:g.color,borderWidth:1,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{datalabels:{display:false},legend:{display:false}},scales:{y:{beginAtZero:false}}}
    });
  }

  // Revenue & ARPU
  const revId = 'ch-rev-'+g.id;
  destroyChart(revId);
  const revCtx = getCtx(revId);
  if(revCtx){
    chartInstances[revId] = new Chart(revCtx,{
      type:'bar',
      data:{
        labels:MONTHS,
        datasets:[
          {type:'bar',label:'Revenue ($M)',data:g.revTrend,backgroundColor:hexToRgba(g.color,.55),borderColor:g.color,borderWidth:1,borderRadius:4,yAxisID:'y'},
          {type:'line',label:'ARPU ($)',data:g.arpu,borderColor:'#FFB900',backgroundColor:'transparent',yAxisID:'y1',borderWidth:2}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{datalabels:{display:false}},
        scales:{y:{beginAtZero:false,position:'left'},y1:{beginAtZero:false,position:'right',grid:{drawOnChartArea:false}}}}
    });
  }

  // MTX/DLC
  const mtxId = 'ch-mtx-'+g.id;
  destroyChart(mtxId);
  const mtxCtx = getCtx(mtxId);
  if(mtxCtx){
    chartInstances[mtxId] = new Chart(mtxCtx,{
      type:'line',
      data:{
        labels:MONTHS,
        datasets:[
          {label:'MTX Conv %',data:g.mtxConv,borderColor:'#FF8C00',backgroundColor:makeGrad(mtxCtx,'#FF8C00',.2,0),fill:true,yAxisID:'y'},
          {label:'DLC Attach %',data:g.dlcAttach,borderColor:'#7B68EE',backgroundColor:'transparent',yAxisID:'y1'}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{datalabels:{display:false}},
        scales:{y:{beginAtZero:false,position:'left'},y1:{beginAtZero:false,position:'right',grid:{drawOnChartArea:false}}}}
    });
  }

  // Retention curve
  const retId = 'ch-ret-'+g.id;
  destroyChart(retId);
  const retCtx = getCtx(retId);
  if(retCtx){
    const rc = g.retCurve;
    // Generate smooth curve points
    const days = [0,1,3,7,14,21,30];
    const vals = [100,rc.d1,rc.d1-(rc.d1-rc.d7)*0.4,rc.d7,rc.d14,(rc.d14+rc.d30)/2,rc.d30];
    chartInstances[retId] = new Chart(retCtx,{
      type:'line',
      data:{
        labels:days.map(d=>'D'+d),
        datasets:[
          {label:'Current Cohort',data:vals,borderColor:g.color,backgroundColor:makeGrad(retCtx,g.color,.25,0),fill:true,pointRadius:3,pointBackgroundColor:g.color},
          {label:'Prior Year',data:vals.map(v=>v-Math.random()*5-2),borderColor:hexToRgba(g.color,.4),borderDash:[5,3],fill:false,pointRadius:0}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{datalabels:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
    });
  }

  // Retention bar benchmarks
  const retBarId = 'ch-retbar-'+g.id;
  destroyChart(retBarId);
  const retBarCtx = getCtx(retBarId);
  if(retBarCtx){
    const rc=g.retCurve;
    chartInstances[retBarId] = new Chart(retBarCtx,{
      type:'bar',
      data:{
        labels:['D1','D7','D14','D30'],
        datasets:[{data:[rc.d1,rc.d7,rc.d14,rc.d30],backgroundColor:[hexToRgba(g.color,.85),hexToRgba(g.color,.65),hexToRgba(g.color,.45),hexToRgba(g.color,.3)],borderRadius:6}]
      },
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},datalabels:{display:true,color:'#fff',anchor:'end',align:'start',offset:6,font:{weight:700,size:13},formatter:v=>v+'%'}},scales:{x:{max:100,ticks:{callback:v=>v+'%'}},y:{grid:{display:false}}}}
    });
  }

  // Platform doughnut
  const platId = 'ch-plat-'+g.id;
  destroyChart(platId);
  const platCtx = getCtx(platId);
  if(platCtx){
    chartInstances[platId] = new Chart(platCtx,{
      type:'doughnut',
      data:{
        labels:['Console','PC','Cloud'],
        datasets:[{data:[g.platform.console,g.platform.pc,g.platform.cloud],backgroundColor:[g.color,hexToRgba(g.color,.55),'#7B68EE'],borderColor:'#161B22',borderWidth:3}]
      },
      options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom'},datalabels:{display:true,color:'#fff',font:{weight:700,size:13},formatter:v=>v+'%'}}}
    });
  }
}

// Initial render
renderCharts('all');
</script>
</body>
</html>
