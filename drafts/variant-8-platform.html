<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xbox Executive Dashboard — Platform Health</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
  --bg:#0D1117;--card:#161B22;--border:#21262D;--text:#E6EDF3;--text-dim:#8B949E;
  --green:#107C10;--green2:#10893E;--lime:#7FBA00;--blue:#0078D4;--purple:#7B68EE;
  --orange:#FF8C00;--red:#E81123;--gold:#FFB900;--cyan:#49CCF9;--pink:#FD71AF;
  --teal:#79D9B9;--sidebar-w:220px;--header-h:56px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;z-index:100;gap:16px}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo svg{width:32px;height:32px}
.header-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.header-subtitle{font-size:12px;color:var(--text-dim);margin-left:8px;padding:3px 10px;background:var(--purple);border-radius:12px;color:#fff;font-weight:600;letter-spacing:0.5px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.header-date{font-size:12px;color:var(--text-dim)}
.header-badge{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.live-badge{background:rgba(16,124,16,.2);color:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* SIDEBAR */
.sidebar{position:fixed;top:var(--header-h);left:0;width:var(--sidebar-w);height:calc(100vh - var(--header-h));background:var(--card);border-right:1px solid var(--border);overflow-y:auto;z-index:90;padding:12px 0}
.sidebar-section{padding:8px 16px;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text-dim);transition:all .15s;border-left:3px solid transparent}
.sidebar-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sidebar-item.active{color:var(--text);background:rgba(16,124,16,.08);border-left-color:var(--green)}
.sidebar-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MAIN */
.main{margin-left:var(--sidebar-w);margin-top:var(--header-h);padding:24px;min-height:calc(100vh - var(--header-h))}
.tab-content{display:none}.tab-content.active{display:block}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.kpi-label{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1.1}
.kpi-sub{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:4px}
.kpi-up{color:var(--green)}.kpi-down{color:var(--red)}.kpi-flat{color:var(--gold)}

/* CHARTS */
.chart-grid{display:grid;gap:16px;margin-bottom:20px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-2-1{grid-template-columns:2fr 1fr}
.grid-1-2{grid-template-columns:1fr 2fr}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.chart-card-title{font-size:13px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.chart-card-sub{font-size:11px;color:var(--text-dim);margin-bottom:14px}
.chart-wrap{position:relative;width:100%;height:260px}
.chart-wrap.tall{height:320px}
.chart-wrap.short{height:200px}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:8px 10px;color:var(--text-dim);font-weight:600;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.data-table td{padding:8px 10px;border-bottom:1px solid rgba(33,38,45,.5)}
.data-table tr:hover td{background:rgba(255,255,255,.02)}
.bar-cell{display:flex;align-items:center;gap:8px}
.bar-fill{height:6px;border-radius:3px;min-width:4px}

/* SECTION HEADER */
.section-header{font-size:15px;font-weight:700;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.section-header .icon{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px}

/* RESPONSIVE */
@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){
  .sidebar{display:none}.main{margin-left:0}
  .grid-2,.grid-3,.grid-2-1,.grid-1-2{grid-template-columns:1fr}
  .kpi-strip{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

// ── HELPERS ──
const fmt = (v,d=1) => v>=1000? (v/1000).toFixed(d)+'B' : v>=1? v.toFixed(d)+'M' : (v*1000).toFixed(0)+'K';
const fmtD = v => '$'+(v>=1000?(v/1000).toFixed(1)+'B':v.toFixed(0)+'M');
const fmtPct = (v,d=1) => v.toFixed(d)+'%';
const last = a => a[a.length-1];
const prev = a => a[a.length-2];
const yoy = (a) => ((last(a)-a[0])/a[0]*100).toFixed(1);
const delta = (a) => {const d=last(a)-prev(a);return d>=0?'+'+d.toFixed(1):d.toFixed(1)};
const kpiColor = v => v>0?'kpi-up':v<0?'kpi-down':'kpi-flat';
const kpiArrow = v => v>0?'▲':v<0?'▼':'—';
const sum = a => a.reduce((s,v)=>s+v,0);

function makeKPI(label,value,change,suffix='',accentColor='var(--green)'){
  const n = parseFloat(change);
  return `<div class="kpi-card" style="--ac:${accentColor}"><style>.kpi-card[style*="${accentColor}"]::before{background:${accentColor}}</style>
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${value}</div>
    <div class="kpi-sub ${kpiColor(n)}"><span>${kpiArrow(n)} ${Math.abs(n).toFixed(1)}%</span><span style="color:var(--text-dim);margin-left:4px">${suffix}</span></div>
  </div>`;
}

Chart.defaults.elements.line.borderWidth = 2;

function mkChart(canvasId, cfg){
  const el = document.getElementById(canvasId);

  return new Chart(el.getContext('2d'), cfg);

// ── TAB BUILDER ──
function buildTotalTab(){
  const totalNow = last(D.totalMAU);
  const totalPrev = D.totalMAU[0];
  const revTotal = D.revConsole.map((_,i)=>D.revConsole[i]+D.revPC[i]+D.revCloud[i]+D.revMobile[i]);
  return `
  <!-- KPI Strip -->
  <div class="kpi-strip">
    ${makeKPI('Total Xbox MAU',fmt(totalNow,1),((totalNow-totalPrev)/totalPrev*100).toFixed(1),'vs May 25','var(--green)')}
    ${makeKPI('Series X|S MAU',fmt(last(D.seriesXS),1),yoy(D.seriesXS),'YTD','var(--green)')}
    ${makeKPI('PC MAU',fmt(last(D.windowsPC),1),yoy(D.windowsPC),'YTD','var(--blue)')}
    ${makeKPI('Cloud MAU',fmt(last(D.cloud),1),yoy(D.cloud),'YTD','var(--purple)')}
    ${makeKPI('Cross-Platform %',fmtPct(last(D.crossPlatPct)),((last(D.crossPlatPct)-D.crossPlatPct[0])/D.crossPlatPct[0]*100).toFixed(1),'YTD','var(--gold)')}
    ${makeKPI('Total Revenue',fmtD(sum(revTotal)),((revTotal[11]-revTotal[0])/revTotal[0]*100).toFixed(1),'MoM','var(--green)')}
  </div>

  <!-- 1. MAU by Platform -->
  <div class="section-header"><span class="icon" style="background:var(--green)">📊</span>Platform MAU Breakdown</div>
  <div class="chart-grid grid-2">
    <div class="chart-card">
      <div class="chart-card-title">MAU by Platform (Stacked Area)</div>
      <div class="chart-card-sub">Monthly Active Users across all Xbox platforms</div>
      <div class="chart-wrap tall"><canvas id="c_mauPlatform"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Platform Mix (% Share)</div>
      <div class="chart-card-sub">Evolving platform share over 12 months</div>
      <div class="chart-wrap tall"><canvas id="c_mauShare"></canvas></div>
    </div>

const charts = [];
function destroyCharts(){ charts.forEach(c=>{try{c.destroy()}catch(e){}}); charts.length=0; }

function areaDS(label,data,color,fill=true){
  return {label,data,borderColor:color,backgroundColor:fill?color+'30':'transparent',fill,pointRadius:0,pointHoverRadius:4,tension:.35,borderWidth:2};
}
function barDS(label,data,color){
  return {label,data,backgroundColor:color+'CC',borderColor:color,borderWidth:1,borderRadius:3};
}
function lineDS(label,data,color,dashed=false){
  return {label,data,borderColor:color,backgroundColor:'transparent',fill:false,tension:.35,borderWidth:2,borderDash:dashed?[5,3]:[],pointRadius:0,pointHoverRadius:4};
}

  charts.push(mkChart(`c_g_plat_${key}`,{type:'bar',data:{labels:M,datasets:dsPlat},options:{responsive:true,maintainAspectRatio:false,scales:{y:{stacked:true,max:100,title:{display:true,text:'% Share'}},x:{stacked:true,grid:{display:false}}},plugins:{legend:{position:'bottom'}}}}));

  // Revenue
  charts.push(mkChart(`c_g_rev_${key}`,{type:'bar',data:{labels:M,datasets:[
    {...barDS('Revenue',g.rev,g.color),borderRadius:4},
  ]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{title:{display:true,text:'$M'}},x:{grid:{display:false}}},plugins:{legend:{display:false}}}}));

  // Retention
  charts.push(mkChart(`c_g_ret_${key}`,{type:'line',data:{labels:M,datasets:[
    {...lineDS('D30 Retention',g.retention,g.color),fill:true,backgroundColor:g.color+'15',borderWidth:3},
  ]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{title:{display:true,text:'%'}},x:{grid:{display:false}}},plugins:{legend:{display:false}}}}));
}

// ── TAB SWITCHING ──
const TABS = {
  total:    {build:buildTotalTab, render:renderTotalCharts},
  gamepass: {build:buildGamePassTab, render:renderGamePassCharts},
  halo:    {build:()=>buildGameTab('halo'), render:()=>renderGameCharts('halo')},
  forza:   {build:()=>buildGameTab('forza'), render:()=>renderGameCharts('forza')},
  cod:     {build:()=>buildGameTab('cod'), render:()=>renderGameCharts('cod')},
  minecraft:{build:()=>buildGameTab('minecraft'), render:()=>renderGameCharts('minecraft')},
  sot:     {build:()=>buildGameTab('sot'), render:()=>renderGameCharts('sot')},
  starfield:{build:()=>buildGameTab('starfield'), render:()=>renderGameCharts('starfield')},
};

function switchTab(tab){
  destroyCharts();
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  const items = document.querySelectorAll('.sidebar-item');
  const tabKeys = Object.keys(TABS);
  const idx = tabKeys.indexOf(tab);
  if(idx>=0 && items[idx]) items[idx].classList.add('active');
  const main = document.getElementById('mainContent');
  main.innerHTML = TABS[tab].build();
  requestAnimationFrame(()=>TABS[tab].render());
}

// Init
switchTab('total');
</script>
