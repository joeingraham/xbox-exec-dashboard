<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xbox Executive Dashboard — Engagement & Playtime</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --bg: #0D1117; --card: #161B22; --border: #21262D; --text: #E6EDF3;
  --text-secondary: #8B949E; --text-muted: #6E7681;
  --xbox-green: #107C10; --bright-green: #10893E; --light-green: #7FBA00;
  --blue: #0078D4; --purple: #7B68EE; --orange: #FF8C00;
  --red: #E81123; --gold: #FFB900;
  --sidebar-w: 220px; --header-h: 56px; --tab-h: 44px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
/* HEADER */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: #010409; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; z-index: 100;
}
.header-logo { display: flex; align-items: center; gap: 12px; }
.header-logo svg { width: 32px; height: 32px; }
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.header-subtitle { font-size: 12px; color: var(--text-secondary); margin-left: 12px; border-left: 1px solid var(--border); padding-left: 12px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text-secondary); }
/* SIDEBAR */
.sidebar {
  position: fixed; top: var(--header-h); left: 0; bottom: 0; width: var(--sidebar-w);
  background: #010409; border-right: 1px solid var(--border);
  padding: 16px 0; overflow-y: auto; z-index: 90;
}
.sidebar-section { padding: 0 16px; margin-bottom: 20px; }
.sidebar-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; }
.sidebar-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px;
  font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
}
.sidebar-item:hover { background: var(--card); color: var(--text); }
.sidebar-item.active { background: rgba(16,124,16,0.15); color: var(--xbox-green); font-weight: 600; }
.sidebar-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
/* GAME TABS */
.tab-bar {
  position: fixed; top: var(--header-h); left: var(--sidebar-w); right: 0;
  height: var(--tab-h); background: #010409; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 4px; z-index: 90; overflow-x: auto;
}
.tab-btn {
  padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer; border: none; background: none;
  white-space: nowrap; transition: all 0.15s; font-family: inherit;
}
.tab-btn:hover { background: var(--card); color: var(--text); }
.tab-btn.active { background: var(--xbox-green); color: #fff; font-weight: 600; }
/* MAIN */
.main {
  margin-left: var(--sidebar-w);
  margin-top: calc(var(--header-h) + var(--tab-h));
  padding: 24px;
  min-height: calc(100vh - var(--header-h) - var(--tab-h));
}
/* SECTION HEADERS */
.section-header {
  display: flex; align-items: center; gap: 10px; margin: 32px 0 16px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.section-header:first-child { margin-top: 0; }
.section-icon { font-size: 18px; }
.section-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.section-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
  background: rgba(16,124,16,0.15); color: var(--xbox-green); margin-left: auto;
}
/* KPI ROW */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 20px; position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--xbox-green); border-radius: 10px 10px 0 0;
}
.kpi-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-value { font-size: 28px; font-weight: 800; margin: 6px 0 4px; letter-spacing: -1px; }
.kpi-delta { font-size: 12px; font-weight: 600; }
.kpi-delta.up { color: var(--light-green); }
.kpi-delta.down { color: var(--red); }
.kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
/* CHART GRID */
.chart-grid { display: grid; gap: 16px; margin-bottom: 24px; }
.chart-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.chart-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.chart-grid.cols-1 { grid-template-columns: 1fr; }
.chart-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px;
}
.chart-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.chart-card-title { font-size: 13px; font-weight: 600; }
.chart-card-tag { font-size: 10px; color: var(--text-muted); background: var(--bg); padding: 2px 8px; border-radius: 4px; }
.chart-wrap { position: relative; width: 100%; }
.chart-wrap canvas { width: 100% !important; }
/* TABLE */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th {
  text-align: left; padding: 8px 12px; font-weight: 600; color: var(--text-secondary);
  border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px;
}
.data-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.bar-cell { display: flex; align-items: center; gap: 8px; }
.bar-fill { height: 6px; border-radius: 3px; }
/* RESPONSIVE */
@media (max-width: 1200px) {
  .chart-grid.cols-2, .chart-grid.cols-3 { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .tab-bar { left: 0; }
  .kpi-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" stroke="#107C10" stroke-width="2"/><path d="M8 16c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8-8-3.6-8-8z" fill="#107C10" opacity="0.3"/><path d="M16 6c-2 2-5 6-5 10s3 8 5 10c2-2 5-6 5-10S18 8 16 6z" fill="#107C10"/></svg>
    <span class="header-title">Xbox Executive Dashboard</span>
    <span class="header-subtitle">Engagement & Playtime · Variant 2</span>
  </div>
  <div class="header-right">
    <span>FY26 · Illustrative Data</span>
    <span>|</span>
    <span id="headerDate"></span>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Focus Areas</div>
    <div class="sidebar-item" onclick="scrollToSection('engagement')">
      <div class="sidebar-dot" style="background:var(--xbox-green)"></div>
      <span>🎮 Engagement</span>
    </div>
    <div class="sidebar-item" onclick="scrollToSection('growth')">
      <div class="sidebar-dot" style="background:var(--blue)"></div>
      <span>📈 Growth</span>
    </div>
    <div class="sidebar-item" onclick="scrollToSection('monetization')">
      <div class="sidebar-dot" style="background:var(--gold)"></div>
      <span>💰 Monetization</span>
    </div>
    <div class="sidebar-item" onclick="scrollToSection('retention')">
      <div class="sidebar-dot" style="background:var(--purple)"></div>
      <span>🔁 Retention</span>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Quick Stats</div>
    <div style="padding:0 12px; font-size:12px; color:var(--text-secondary); line-height:1.8;">
      <div>MAU: <strong style="color:var(--text)">220M</strong></div>
      <div>DAU: <strong style="color:var(--text)">78M</strong></div>
      <div>DAU/MAU: <strong style="color:var(--light-green)">35.5%</strong></div>
      <div>Avg Session: <strong style="color:var(--text)">52 min</strong></div>
      <div>PCU: <strong style="color:var(--text)">32.1M</strong></div>
    </div>
  </div>
</div>

<!-- GAME TABS -->
<div class="tab-bar" id="tabBar"></div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<script>
// ─── Globals ─────────────────────────────────────────────
Chart.defaults.color = '#8B949E';
Chart.defaults.font.family = 'Inter';
Chart.defaults.font.size = 11;
Chart.defaults.plugins.legend.labels.usePointStyle = true;
Chart.defaults.plugins.legend.labels.pointStyleWidth = 8;
Chart.defaults.plugins.legend.labels.boxHeight = 7;
Chart.defaults.elements.point.radius = 2;
Chart.defaults.elements.point.hoverRadius = 5;
Chart.defaults.elements.line.tension = 0.35;
Chart.defaults.plugins.tooltip.backgroundColor = '#1C2128';
Chart.defaults.plugins.tooltip.borderColor = '#21262D';
Chart.defaults.plugins.tooltip.borderWidth = 1;
Chart.defaults.plugins.tooltip.cornerRadius = 8;
Chart.defaults.plugins.tooltip.padding = 10;

const MONTHS = ['May 25','Jun 25','Jul 25','Aug 25','Sep 25','Oct 25','Nov 25','Dec 25','Jan 26','Feb 26','Mar 26','Apr 26'];
const C = { green:'#107C10', bgreen:'#10893E', lgreen:'#7FBA00', blue:'#0078D4', purple:'#7B68EE', orange:'#FF8C00', red:'#E81123', gold:'#FFB900' };

const GAMES = ['Total Xbox','Game Pass','Halo','Forza','Call of Duty','Minecraft','Sea of Thieves','Starfield'];
let currentGame = 0;
let charts = {};

// ─── Data Generator ──────────────────────────────────────
function rng(base, variance, trend, n) {
  const arr = [];
  for (let i = 0; i < n; i++) {
    arr.push(+(base + trend * i + (Math.random() - 0.4) * variance).toFixed(2));
  }
  return arr;
}

function getData(game) {
  const g = game;
  const D = {};
  if (g === 0) { // Total Xbox
    D.totalMinutes = rng(12.1, 0.8, 0.18, 12);       // billions
    D.minPerUserConsole = rng(62, 4, 0.3, 12);
    D.minPerUserPC = rng(48, 3, 0.5, 12);
    D.minPerUserCloud = rng(34, 3, 0.8, 12);
    D.dauMau = rng(32, 1.2, 0.3, 12);                 // %
    D.wauMau = rng(52, 1.5, 0.25, 12);                // %
    D.sessionDist = [18, 22, 27, 19, 10, 4];           // % by bucket
    D.sessPerWeekCasual = rng(2.1, 0.3, 0.02, 12);
    D.sessPerWeekCore = rng(4.8, 0.4, 0.03, 12);
    D.sessPerWeekHardcore = rng(9.2, 0.6, 0.05, 12);
    D.pcu = rng(28, 3, 0.35, 12);                     // millions
    D.pcuAnnotations = [{i:2,label:'Halo S2 Launch'},{i:7,label:'CoD Holiday'},{i:10,label:'Starfield DLC'}];
    D.engDepth1 = rng(30, 1, -0.2, 12);
    D.engDepth23 = rng(28, 1, 0.1, 12);
    D.engDepth45 = rng(22, 1, 0.15, 12);
    D.engDepth67 = rng(20, 1, 0.25, 12);
    D.todHours = [3,2,2,1,1,2,5,8,7,6,7,8,9,8,7,8,10,12,14,13,11,9,7,5]; // % by hour 0-23
    D.crossPlat = rng(18, 1, 0.4, 12);                // %
    D.mau = rng(195, 5, 2.1, 12);                     // millions
    D.newUsers = rng(8.2, 1, 0.1, 12);                // millions
    D.revenue = rng(1.8, 0.15, 0.02, 12);             // $B
    D.arpu = rng(9.2, 0.4, 0.05, 12);                 // $
    D.d1Ret = [100,52,38,30,25,22,20,18,16,15,14,13,12];
    D.d7Ret = [100,65,50,42,36,32,29,27,25,23,22,21,20];
  } else if (g === 1) { // Game Pass
    D.totalMinutes = rng(5.8, 0.5, 0.12, 12);
    D.minPerUserConsole = rng(72, 5, 0.4, 12);
    D.minPerUserPC = rng(55, 4, 0.6, 12);
    D.minPerUserCloud = rng(38, 3, 0.7, 12);
    D.dauMau = rng(38, 1.5, 0.35, 12);
    D.wauMau = rng(58, 1.5, 0.3, 12);
    D.sessionDist = [12, 18, 28, 24, 13, 5];
    D.sessPerWeekCasual = rng(2.5, 0.3, 0.03, 12);
    D.sessPerWeekCore = rng(5.5, 0.4, 0.04, 12);
    D.sessPerWeekHardcore = rng(10.5, 0.6, 0.06, 12);
    D.pcu = rng(14, 2, 0.2, 12);
    D.pcuAnnotations = [{i:4,label:'Day 1 Launch: Avowed'},{i:9,label:'Day 1: Fable'}];
    D.engDepth1 = rng(25, 1, -0.3, 12);
    D.engDepth23 = rng(27, 1, 0.1, 12);
    D.engDepth45 = rng(25, 1, 0.2, 12);
    D.engDepth67 = rng(23, 1, 0.3, 12);
    D.todHours = [2,2,1,1,1,2,4,7,6,6,7,8,9,8,8,9,11,13,15,14,12,10,7,4];
    D.crossPlat = rng(24, 1.5, 0.5, 12);
    D.mau = rng(42, 2, 0.8, 12);
    D.newUsers = rng(3.5, 0.5, 0.08, 12);
    D.revenue = rng(0.65, 0.05, 0.015, 12);
    D.arpu = rng(15.5, 0.6, 0.08, 12);
    D.d1Ret = [100,62,48,40,35,32,30,28,26,25,24,23,22];
    D.d7Ret = [100,72,58,50,44,40,37,35,33,31,30,29,28];
  } else { // Per-game
    const bases = {
      2: {min:0.9,mpc:75,dau:28,pcu:2.8,mau:22,rev:0.12,sess:[20,24,26,17,9,4],name:'Halo'},
      3: {min:0.7,mpc:55,dau:30,pcu:2.1,mau:18,rev:0.08,sess:[15,20,30,22,10,3],name:'Forza'},
      4: {min:2.5,mpc:68,dau:34,pcu:8.5,mau:65,rev:0.45,sess:[14,18,25,24,14,5],name:'Call of Duty'},
      5: {min:3.2,mpc:42,dau:36,pcu:4.2,mau:170,rev:0.35,sess:[25,28,24,14,7,2],name:'Minecraft'},
      6: {min:0.4,mpc:82,dau:26,pcu:0.9,mau:8,rev:0.04,sess:[10,16,28,26,14,6],name:'Sea of Thieves'},
      7: {min:0.6,mpc:90,dau:24,pcu:1.5,mau:12,rev:0.06,sess:[8,14,24,28,18,8],name:'Starfield'}
    };
    const b = bases[g];
    D.totalMinutes = rng(b.min, b.min*0.08, b.min*0.012, 12);
    D.minPerUserConsole = rng(b.mpc, 5, 0.3, 12);
    D.minPerUserPC = rng(b.mpc*0.75, 4, 0.4, 12);
    D.minPerUserCloud = rng(b.mpc*0.5, 3, 0.5, 12);
    D.dauMau = rng(b.dau, 1.5, 0.2, 12);
    D.wauMau = rng(b.dau+18, 1.5, 0.15, 12);
    D.sessionDist = b.sess;
    D.sessPerWeekCasual = rng(1.8, 0.3, 0.02, 12);
    D.sessPerWeekCore = rng(4.2, 0.4, 0.03, 12);
    D.sessPerWeekHardcore = rng(8.5, 0.6, 0.04, 12);
    D.pcu = rng(b.pcu, b.pcu*0.1, b.pcu*0.01, 12);
    D.pcuAnnotations = [{i:3,label:'Season Update'},{i:8,label:'Major Patch'}];
    D.engDepth1 = rng(32, 1, -0.2, 12);
    D.engDepth23 = rng(28, 1, 0.1, 12);
    D.engDepth45 = rng(22, 1, 0.12, 12);
    D.engDepth67 = rng(18, 1, 0.2, 12);
    D.todHours = [3,2,2,1,1,2,5,8,7,6,7,8,9,8,7,8,10,12,14,13,11,9,7,5];
    D.crossPlat = rng(15+g, 1, 0.3, 12);
    D.mau = rng(b.mau, b.mau*0.03, b.mau*0.008, 12);
    D.newUsers = rng(b.mau*0.04, b.mau*0.005, 0.01, 12);
    D.revenue = rng(b.rev, b.rev*0.08, b.rev*0.005, 12);
    D.arpu = rng(b.rev/b.mau*1000*1.1, 0.3, 0.02, 12);
    D.d1Ret = [100,48,34,27,23,20,18,16,14,13,12,11,10];
    D.d7Ret = [100,60,46,38,32,28,25,23,21,20,19,18,17];
  }
  return D;
}

// ─── Chart helpers ───────────────────────────────────────
function gridLines() { return { color: 'rgba(48,54,61,0.6)', lineWidth: 0.8 }; }
function noLabel() { return { display: false }; }
function alpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function areaFill(hex) { return { target:'origin', backgroundColor: alpha(hex, 0.12) }; }
function pct(v) { return v.toFixed(1) + '%'; }
function fmt(v,u) {
  if (u === 'B') return v.toFixed(1) + 'B';
  if (u === 'M') return v.toFixed(1) + 'M';
  if (u === '$B') return '$' + v.toFixed(2) + 'B';
  if (u === '$') return '$' + v.toFixed(2);
  if (u === 'min') return v.toFixed(0) + ' min';
  if (u === '%') return v.toFixed(1) + '%';
  return v.toFixed(1);
}
function delta(arr) {
  const last = arr[arr.length-1], prev = arr[arr.length-2];
  const d = ((last - prev) / prev * 100).toFixed(1);
  return { val: (d >= 0 ? '+' : '') + d + '% MoM', cls: d >= 0 ? 'up' : 'down' };
}

function makeChart(canvasId, cfg) {
  if (charts[canvasId]) { charts[canvasId].destroy(); }
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  cfg.options = cfg.options || {};
  cfg.options.responsive = true;
  cfg.options.maintainAspectRatio = false;
  cfg.plugins = cfg.plugins || [];
  charts[canvasId] = new Chart(ctx, cfg);
}

// ─── Render Tabs ─────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = GAMES.map((g,i) =>
    `<button class="tab-btn${i===currentGame?' active':''}" onclick="switchGame(${i})">${g}</button>`
  ).join('');
}

function switchGame(i) {
  currentGame = i;
  renderTabs();
  renderDashboard();
}

function scrollToSection(id) {
  const el = document.getElementById('section-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── Main Render ─────────────────────────────────────────
function renderDashboard() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  const D = getData(currentGame);
  const gn = GAMES[currentGame];
  const isTotal = currentGame === 0;
  const isGP = currentGame === 1;
  const unitMin = (isTotal || isGP) ? 'B' : 'B';

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <!-- ═══ ENGAGEMENT ═══ -->
    <div id="section-engagement">
      <div class="section-header">
        <span class="section-icon">🎮</span>
        <span class="section-title">Engagement & Playtime — ${gn}</span>
        <span class="section-badge">PRIMARY FOCUS</span>
      </div>

      <div class="kpi-row">
        <div class="kpi-card">
          <div class="kpi-label">Total Minutes Played</div>
          <div class="kpi-value">${fmt(D.totalMinutes[11],'B')}</div>
          <div class="kpi-delta ${delta(D.totalMinutes).cls}">${delta(D.totalMinutes).val}</div>
          <div class="kpi-sub">Monthly · All platforms</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">DAU/MAU Stickiness</div>
          <div class="kpi-value">${pct(D.dauMau[11])}</div>
          <div class="kpi-delta ${delta(D.dauMau).cls}">${delta(D.dauMau).val}</div>
          <div class="kpi-sub">Apr 2026</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Avg Session Duration</div>
          <div class="kpi-value">${fmt(D.minPerUserConsole[11],'min')}</div>
          <div class="kpi-delta ${delta(D.minPerUserConsole).cls}">${delta(D.minPerUserConsole).val}</div>
          <div class="kpi-sub">Console platform</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Peak Concurrent Users</div>
          <div class="kpi-value">${fmt(D.pcu[11],'M')}</div>
          <div class="kpi-delta ${delta(D.pcu).cls}">${delta(D.pcu).val}</div>
          <div class="kpi-sub">Monthly peak</div>
        </div>
        <div class="kpi-card" style="--kpi-accent:var(--blue)">
          <div class="kpi-label">Cross-Platform Play</div>
          <div class="kpi-value">${pct(D.crossPlat[11])}</div>
          <div class="kpi-delta ${delta(D.crossPlat).cls}">${delta(D.crossPlat).val}</div>

      </div>

      <!-- Row 1 -->
      <div class="chart-grid cols-2">
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">1. Total Minutes Played</span>
            <span class="chart-card-tag">Billions / month</span>
          </div>
          <div class="chart-wrap" style="height:260px"><canvas id="c-totalMin"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">2. Minutes per User per Day</span>
            <span class="chart-card-tag">By Platform</span>
          </div>
          <div class="chart-wrap" style="height:260px"><canvas id="c-minPerUser"></canvas></div>
        </div>
      </div>

      <!-- Row 2 -->
      <div class="chart-grid cols-2">
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">3. DAU/MAU Stickiness Ratio</span>
            <span class="chart-card-tag">Trending 12mo</span>
          </div>
          <div class="chart-wrap" style="height:240px"><canvas id="c-dauMau"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">4. WAU/MAU Stickiness</span>
            <span class="chart-card-tag">Trending 12mo</span>
          </div>
          <div class="chart-wrap" style="height:240px"><canvas id="c-wauMau"></canvas></div>
        </div>
      </div>

      <!-- Row 3 -->
      <div class="chart-grid cols-2">
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">5. Session Duration Distribution</span>
            <span class="chart-card-tag">% of Sessions</span>
          </div>
          <div class="chart-wrap" style="height:240px"><canvas id="c-sessDist"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">6. Sessions per User per Week</span>
            <span class="chart-card-tag">By Segment</span>
          </div>
          <div class="chart-wrap" style="height:240px"><canvas id="c-sessPerWeek"></canvas></div>
        </div>
      </div>

      <!-- Row 4: wide PCU -->
      <div class="chart-grid cols-1">
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">7. Peak Concurrent Users (PCU)</span>
            <span class="chart-card-tag">Millions · Monthly Peak</span>
          </div>
          <div class="chart-wrap" style="height:280px"><canvas id="c-pcu"></canvas></div>
        </div>
      </div>

      <!-- Row 5 -->
      <div class="chart-grid cols-2">
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">8. Engagement Depth: % MAU by Days Active</span>
            <span class="chart-card-tag">Per Week</span>
          </div>
          <div class="chart-wrap" style="height:260px"><canvas id="c-engDepth"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">9. Time of Day Activity</span>
            <span class="chart-card-tag">% of Daily Sessions</span>
          </div>
          <div class="chart-wrap" style="height:260px"><canvas id="c-tod"></canvas></div>
        </div>
      </div>

      <!-- Row 6 -->
      <div class="chart-grid cols-2">
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">10. Cross-Platform Play %</span>
            <span class="chart-card-tag">2+ Platforms</span>
          </div>
          <div class="chart-wrap" style="height:240px"><canvas id="c-crossPlat"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-card-title">Engagement Summary Table</span>
            <span class="chart-card-tag">Latest Month</span>
          </div>
          <table class="data-table">
            <thead><tr><th>Metric</th><th>Value</th><th>MoM</th></tr></thead>
            <tbody>
              <tr><td>Total Minutes</td><td>${fmt(D.totalMinutes[11],'B')}</td><td class="${delta(D.totalMinutes).cls}">${delta(D.totalMinutes).val}</td></tr>
              <tr><td>DAU/MAU</td><td>${pct(D.dauMau[11])}</td><td class="${delta(D.dauMau).cls}">${delta(D.dauMau).val}</td></tr>
              <tr><td>WAU/MAU</td><td>${pct(D.wauMau[11])}</td><td class="${delta(D.wauMau).cls}">${delta(D.wauMau).val}</td></tr>
              <tr><td>PCU</td><td>${fmt(D.pcu[11],'M')}</td><td class="${delta(D.pcu).cls}">${delta(D.pcu).val}</td></tr>
              <tr><td>Cross-Platform</td><td>${pct(D.crossPlat[11])}</td><td class="${delta(D.crossPlat).cls}">${delta(D.crossPlat).val}</td></tr>
              <tr><td>Console min/user/day</td><td>${D.minPerUserConsole[11].toFixed(0)} min</td><td class="${delta(D.minPerUserConsole).cls}">${delta(D.minPerUserConsole).val}</td></tr>
              <tr><td>PC min/user/day</td><td>${D.minPerUserPC[11].toFixed(0)} min</td><td class="${delta(D.minPerUserPC).cls}">${delta(D.minPerUserPC).val}</td></tr>
              <tr><td>Cloud min/user/day</td><td>${D.minPerUserCloud[11].toFixed(0)} min</td><td class="${delta(D.minPerUserCloud).cls}">${delta(D.minPerUserCloud).val}</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ═══ GROWTH ═══ -->
    <div id="section-growth">
      <div class="section-header">
        <span class="section-icon">📈</span>
        <span class="section-title">Growth — ${gn}</span>
      </div>
      <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-label">MAU</div><div class="kpi-value">${fmt(D.mau[11],'M')}</div><div class="kpi-delta ${delta(D.mau).cls}">${delta(D.mau).val}</div></div>
        <div class="kpi-card"><div class="kpi-label">New Users / Mo</div><div class="kpi-value">${fmt(D.newUsers[11],'M')}</div><div class="kpi-delta ${delta(D.newUsers).cls}">${delta(D.newUsers).val}</div></div>
      </div>
      <div class="chart-grid cols-2">
        <div class="chart-card">
          <div class="chart-card-header"><span class="chart-card-title">Monthly Active Users</span><span class="chart-card-tag">Millions</span></div>
          <div class="chart-wrap" style="height:220px"><canvas id="c-mau"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header"><span class="chart-card-title">New Users</span><span class="chart-card-tag">Millions / mo</span></div>
          <div class="chart-wrap" style="height:220px"><canvas id="c-newUsers"></canvas></div>
        </div>
      </div>
    </div>

    <!-- ═══ MONETIZATION ═══ -->
    <div id="section-monetization">
      <div class="section-header">
        <span class="section-icon">💰</span>
        <span class="section-title">Monetization — ${gn}</span>
      </div>
      <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-label">Revenue</div><div class="kpi-value">${fmt(D.revenue[11],'$B')}</div><div class="kpi-delta ${delta(D.revenue).cls}">${delta(D.revenue).val}</div></div>
        <div class="kpi-card"><div class="kpi-label">ARPU</div><div class="kpi-value">${fmt(D.arpu[11],'$')}</div><div class="kpi-delta ${delta(D.arpu).cls}">${delta(D.arpu).val}</div></div>
      </div>
      <div class="chart-grid cols-2">
        <div class="chart-card">
          <div class="chart-card-header"><span class="chart-card-title">Revenue</span><span class="chart-card-tag">$B / mo</span></div>
          <div class="chart-wrap" style="height:220px"><canvas id="c-revenue"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header"><span class="chart-card-title">ARPU</span><span class="chart-card-tag">$ / user / mo</span></div>
          <div class="chart-wrap" style="height:220px"><canvas id="c-arpu"></canvas></div>
        </div>
      </div>
    </div>

    <!-- ═══ RETENTION ═══ -->
    <div id="section-retention">
      <div class="section-header">
        <span class="section-icon">🔁</span>
        <span class="section-title">Retention — ${gn}</span>
      </div>
      <div class="chart-grid cols-1">
        <div class="chart-card">
          <div class="chart-card-header"><span class="chart-card-title">Cohort Retention Curves</span><span class="chart-card-tag">% Retained</span></div>
          <div class="chart-wrap" style="height:260px"><canvas id="c-retention"></canvas></div>
        </div>
      </div>
    </div>
  `;

  buildCharts(D);
}

// ─── Build All Charts ────────────────────────────────────
function buildCharts(D) {
  // 1. Total Minutes
  makeChart('c-totalMin', {
    type: 'line',
    data: { labels: MONTHS, datasets: [{
      label: 'Total Minutes', data: D.totalMinutes,
      borderColor: C.green, backgroundColor: alpha(C.green, 0.15),
      fill: true, borderWidth: 2.5, pointBackgroundColor: C.green
    }]},
    options: {
      scales: { y: { grid: gridLines(), title: { display:true, text:'Billions', color:'#6E7681', font:{size:10} }, beginAtZero: false },
                x: { grid: { display:false } }},
      plugins: { datalabels: { display: (ctx) => ctx.dataIndex % 3 === 0 || ctx.dataIndex === 11,
        anchor:'end', align:'top', color:'#E6EDF3', font:{size:10,weight:600},
        formatter: v => v.toFixed(1)+'B'
      }}
    },
    plugins: [ChartDataLabels]
  });

  // 2. Minutes per User
  makeChart('c-minPerUser', {
    type: 'line',
    data: { labels: MONTHS, datasets: [
      { label:'Console', data:D.minPerUserConsole, borderColor:C.green, borderWidth:2.5, pointBackgroundColor:C.green },
      { label:'PC', data:D.minPerUserPC, borderColor:C.blue, borderWidth:2, pointBackgroundColor:C.blue },
      { label:'Cloud', data:D.minPerUserCloud, borderColor:C.purple, borderWidth:2, pointBackgroundColor:C.purple }
    ]},
    options: { scales: { y: { grid:gridLines(), title:{display:true,text:'Minutes',color:'#6E7681',font:{size:10}} }, x:{grid:{display:false}} },
      plugins: { datalabels: { display:false } }
    }
  });

  // 3. DAU/MAU
  makeChart('c-dauMau', {
    type: 'line',
    data: { labels: MONTHS, datasets: [{
      label:'DAU/MAU %', data:D.dauMau, borderColor:C.lgreen, backgroundColor:alpha(C.lgreen,0.1),
      fill:true, borderWidth:2.5, pointBackgroundColor:C.lgreen
    }]},
    options: { scales: { y:{ grid:gridLines(), ticks:{callback:v=>v+'%'} }, x:{grid:{display:false}} },
      plugins: { datalabels:{ display:(ctx)=>ctx.dataIndex===0||ctx.dataIndex===11,
        anchor:'end',align:'top',color:'#E6EDF3',font:{size:10,weight:600},formatter:v=>v.toFixed(1)+'%'
      }}
    },
    plugins: [ChartDataLabels]
  });

  // 4. WAU/MAU
  makeChart('c-wauMau', {
    type: 'line',
    data: { labels: MONTHS, datasets: [{
      label:'WAU/MAU %', data:D.wauMau, borderColor:C.blue, backgroundColor:alpha(C.blue,0.1),
      fill:true, borderWidth:2.5, pointBackgroundColor:C.blue
    }]},
    options: { scales: { y:{ grid:gridLines(), ticks:{callback:v=>v+'%'} }, x:{grid:{display:false}} },
      plugins: { datalabels:{ display:(ctx)=>ctx.dataIndex===0||ctx.dataIndex===11,
        anchor:'end',align:'top',color:'#E6EDF3',font:{size:10,weight:600},formatter:v=>v.toFixed(1)+'%'
      }}
    },
    plugins: [ChartDataLabels]
  });

  // 5. Session Duration Distribution (histogram)
  const sessBuckets = ['0–15 min','15–30 min','30–60 min','1–2 hr','2–4 hr','4+ hr'];
  const sessColors = [C.green, C.bgreen, C.lgreen, C.blue, C.purple, C.orange];
  makeChart('c-sessDist', {
    type: 'bar',
    data: { labels: sessBuckets, datasets: [{
      label:'% of Sessions', data:D.sessionDist,
      backgroundColor: sessColors.map(c=>alpha(c,0.7)),
      borderColor: sessColors, borderWidth:1.5, borderRadius:4
    }]},
    options: { scales: { y:{grid:gridLines(),ticks:{callback:v=>v+'%'}}, x:{grid:{display:false}} },
      plugins: { datalabels:{anchor:'end',align:'top',color:'#E6EDF3',font:{size:10,weight:600},formatter:v=>v+'%'},
        legend:{display:false}
      }
    },
    plugins: [ChartDataLabels]
  });

  // 6. Sessions per User per Week
  makeChart('c-sessPerWeek', {
    type: 'line',
    data: { labels: MONTHS, datasets: [
      { label:'Hardcore', data:D.sessPerWeekHardcore, borderColor:C.red, borderWidth:2, pointBackgroundColor:C.red },
      { label:'Core', data:D.sessPerWeekCore, borderColor:C.orange, borderWidth:2, pointBackgroundColor:C.orange },
      { label:'Casual', data:D.sessPerWeekCasual, borderColor:C.gold, borderWidth:2, pointBackgroundColor:C.gold }
    ]},
    options: { scales: { y:{grid:gridLines(),title:{display:true,text:'Sessions / week',color:'#6E7681',font:{size:10}}}, x:{grid:{display:false}} },
      plugins: { datalabels:{display:false} }
    }
  });

  // 7. PCU with annotations
  const pcuAnnotations = {};
  D.pcuAnnotations.forEach((a,idx) => {
    pcuAnnotations['a'+idx] = {
      type:'line', xMin:a.i, xMax:a.i, borderColor:alpha(C.gold,0.6), borderWidth:1.5, borderDash:[4,4],
      label:{ display:true, content:a.label, position:'start', backgroundColor:alpha(C.gold,0.15),
        color:C.gold, font:{size:10,weight:500}, padding:4, borderRadius:4 }
    };
  });
  makeChart('c-pcu', {
    type: 'line',
    data: { labels: MONTHS, datasets: [{
      label:'Peak Concurrent Users', data:D.pcu, borderColor:C.orange, backgroundColor:alpha(C.orange,0.12),
      fill:true, borderWidth:2.5, pointBackgroundColor:C.orange, pointRadius:4
    }]},
    options: {
      scales: { y:{grid:gridLines(),title:{display:true,text:'Millions',color:'#6E7681',font:{size:10}}}, x:{grid:{display:false}} },
      plugins: {
        annotation:{ annotations: pcuAnnotations },
        datalabels:{ display:(ctx)=>D.pcuAnnotations.some(a=>a.i===ctx.dataIndex),
          anchor:'end',align:'top',color:C.gold,font:{size:10,weight:700},formatter:v=>v.toFixed(1)+'M'
        }
      }
    },
    plugins: [ChartDataLabels]
  });

  // 8. Engagement Depth (stacked area)
  makeChart('c-engDepth', {
    type: 'line',
    data: { labels: MONTHS, datasets: [
      { label:'6–7 days', data:D.engDepth67, borderColor:C.green, backgroundColor:alpha(C.green,0.5), fill:true, borderWidth:1.5, order:4 },
      { label:'4–5 days', data:D.engDepth45, borderColor:C.bgreen, backgroundColor:alpha(C.bgreen,0.4), fill:true, borderWidth:1.5, order:3 },
      { label:'2–3 days', data:D.engDepth23, borderColor:C.lgreen, backgroundColor:alpha(C.lgreen,0.3), fill:true, borderWidth:1.5, order:2 },
      { label:'1 day', data:D.engDepth1, borderColor:C.blue, backgroundColor:alpha(C.blue,0.25), fill:true, borderWidth:1.5, order:1 }
    ]},
    options: {
      scales: { y:{grid:gridLines(),stacked:true,ticks:{callback:v=>v+'%'}}, x:{grid:{display:false}} },
      plugins: { datalabels:{display:false} }
    }
  });

  // 9. Time of Day (grouped bar)
  const hourLabels = ['12a','','2a','','4a','','6a','','8a','','10a','','12p','','2p','','4p','','6p','','8p','','10p',''];
  const todColors = D.todHours.map(v => {
    if (v >= 12) return alpha(C.green, 0.9);
    if (v >= 8) return alpha(C.lgreen, 0.7);
    if (v >= 5) return alpha(C.blue, 0.6);
    return alpha(C.purple, 0.4);
  });
  makeChart('c-tod', {
    type: 'bar',
    data: { labels: hourLabels, datasets: [{
      label:'% of Sessions', data:D.todHours,
      backgroundColor: todColors, borderRadius: 2, barPercentage:0.85
    }]},
    options: { scales: { y:{grid:gridLines(),ticks:{callback:v=>v+'%'}}, x:{grid:{display:false}} },
      plugins: { legend:{display:false}, datalabels:{display:false},
        tooltip:{callbacks:{title:items=>'Hour: '+items[0].dataIndex+':00'}}
      }
    }
  });

  // 10. Cross-Platform %
  makeChart('c-crossPlat', {
    type: 'line',
    data: { labels: MONTHS, datasets: [{
      label:'Cross-Platform %', data:D.crossPlat, borderColor:C.purple, backgroundColor:alpha(C.purple,0.12),
      fill:true, borderWidth:2.5, pointBackgroundColor:C.purple
    }]},
    options: { scales: { y:{grid:gridLines(),ticks:{callback:v=>v+'%'}}, x:{grid:{display:false}} },
      plugins: { datalabels:{ display:(ctx)=>ctx.dataIndex===0||ctx.dataIndex===11,
        anchor:'end',align:'top',color:'#E6EDF3',font:{size:10,weight:600},formatter:v=>v.toFixed(1)+'%'
      }}
    },
    plugins: [ChartDataLabels]
  });

  // ─── Growth charts ───
  makeChart('c-mau', {
    type: 'bar',
    data: { labels: MONTHS, datasets: [{
      label:'MAU', data:D.mau, backgroundColor:alpha(C.blue,0.6), borderColor:C.blue, borderWidth:1, borderRadius:4
    }]},
    options: { scales:{ y:{grid:gridLines()}, x:{grid:{display:false}} },
      plugins:{ datalabels:{display:(ctx)=>ctx.dataIndex%3===0||ctx.dataIndex===11,anchor:'end',align:'top',
        color:'#E6EDF3',font:{size:10,weight:600},formatter:v=>v.toFixed(0)+'M'}, legend:{display:false} }
    },
    plugins:[ChartDataLabels]
  });

  makeChart('c-newUsers', {
    type: 'bar',
    data: { labels: MONTHS, datasets: [{
      label:'New Users', data:D.newUsers, backgroundColor:alpha(C.bgreen,0.6), borderColor:C.bgreen, borderWidth:1, borderRadius:4
    }]},
    options: { scales:{ y:{grid:gridLines()}, x:{grid:{display:false}} },
      plugins:{ datalabels:{display:false}, legend:{display:false} }
    }
  });

  // ─── Monetization charts ───
  makeChart('c-revenue', {
    type: 'line',
    data: { labels: MONTHS, datasets: [{
      label:'Revenue', data:D.revenue, borderColor:C.gold, backgroundColor:alpha(C.gold,0.12),
      fill:true, borderWidth:2.5, pointBackgroundColor:C.gold
    }]},
    options: { scales:{ y:{grid:gridLines(),ticks:{callback:v=>'$'+v.toFixed(1)+'B'}}, x:{grid:{display:false}} },
      plugins:{ datalabels:{display:false} }
    }
  });

  makeChart('c-arpu', {
    type: 'line',
    data: { labels: MONTHS, datasets: [{
      label:'ARPU', data:D.arpu, borderColor:C.orange, backgroundColor:alpha(C.orange,0.12),
      fill:true, borderWidth:2.5, pointBackgroundColor:C.orange
    }]},
    options: { scales:{ y:{grid:gridLines(),ticks:{callback:v=>'$'+v.toFixed(2)}}, x:{grid:{display:false}} },
      plugins:{ datalabels:{display:false} }
    }
  });

  // ─── Retention ───
  const retLabels = ['D0','D1','D7','D14','D21','D28','D35','D42','D49','D56','D63','D70','D77'];
  makeChart('c-retention', {
    type: 'line',
    data: { labels: retLabels, datasets: [
      { label:'Organic Users', data:D.d1Ret, borderColor:C.green, borderWidth:2.5, pointBackgroundColor:C.green, backgroundColor:alpha(C.green,0.08), fill:true },
      { label:'Game Pass Users', data:D.d7Ret, borderColor:C.blue, borderWidth:2, pointBackgroundColor:C.blue, backgroundColor:alpha(C.blue,0.06), fill:true }
    ]},
    options: { scales:{ y:{grid:gridLines(),ticks:{callback:v=>v+'%'},min:0,max:105}, x:{grid:{display:false}} },
      plugins:{ datalabels:{display:(ctx)=>ctx.dataIndex===0||ctx.dataIndex===6||ctx.dataIndex===12,
        anchor:'end',align:'top',color:'#E6EDF3',font:{size:10,weight:600},formatter:v=>v+'%'
      }}
    },
    plugins:[ChartDataLabels]
  });
}

// ─── Init ────────────────────────────────────────────────
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
renderTabs();
renderDashboard();

// Highlight sidebar on scroll
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id.replace('section-','');
      document.querySelectorAll('.sidebar-item').forEach(el => {
        el.classList.toggle('active', el.textContent.toLowerCase().includes(id.slice(0,4)));
      });
    }
  });
}, { threshold: 0.3 });
['engagement','growth','monetization','retention'].forEach(s => {
  const el = document.getElementById('section-'+s);
  if (el) observer.observe(el);
});
</script>
</body>
