<style>
:root {
  --bg: #0D1117; --card: #161B22; --border: #21262D; --text: #E6EDF3;
  --text-dim: #8B949E; --text-muted: #484F58;
  --green: #107C10; --green-mid: #10893E; --green-light: #7FBA00;
  --blue: #0078D4; --purple: #7B68EE; --orange: #FF8C00;
  --red: #E81123; --gold: #FFB900; --teal: #2EA043;
  --sidebar-w: 220px; --header-h: 56px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* HEADER */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(13,17,23,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); display: flex; align-items: center;
  padding: 0 24px; z-index: 100; gap: 16px;
}
.header-logo { display: flex; align-items: center; gap: 10px; }
.header-logo svg { width: 28px; height: 28px; }
.header-logo span { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
.header-badge { background: var(--green); color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.header-date { color: var(--text-dim); font-size: 12px; }

/* SIDEBAR */
.sidebar {
  position: fixed; top: var(--header-h); left: 0; width: var(--sidebar-w);
  height: calc(100vh - var(--header-h)); background: var(--card);
  border-right: 1px solid var(--border); overflow-y: auto; z-index: 90; padding: 12px 0;
}
.sidebar-section { padding: 8px 16px; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-top: 8px; }
.sidebar-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 16px;
  cursor: pointer; font-size: 13px; color: var(--text-dim); transition: all 0.15s;
  border-left: 3px solid transparent;
}
.sidebar-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.sidebar-item.active { color: var(--green-light); background: rgba(127,186,0,0.06);
  border-left-color: var(--green-light); font-weight: 600; }
.sidebar-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* MAIN */
.main { margin-left: var(--sidebar-w); margin-top: var(--header-h); padding: 24px; min-height: calc(100vh - var(--header-h)); }

/* TAB CONTENT */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* SECTION */
.section { margin-bottom: 28px; }
.section-title { font-size: 14px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-dim); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px; }
.section-title::before { content: ''; width: 3px; height: 16px; border-radius: 2px; background: var(--green); }

/* KPI HERO TILES */
.kpi-hero-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.kpi-hero {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; position: relative; overflow: hidden;
}
.kpi-hero .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 6px; }
.kpi-hero .kpi-value { font-size: 32px; font-weight: 800; letter-spacing: -1px; line-height: 1.1; }
.kpi-hero .kpi-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; display: flex; align-items: center; gap: 6px; }
.kpi-hero .kpi-delta { font-size: 12px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
.kpi-hero .kpi-delta.up { color: var(--green-light); background: rgba(127,186,0,0.12); }
.kpi-hero .kpi-delta.down { color: var(--red); background: rgba(232,17,35,0.12); }
.kpi-hero .sparkline-container { position: absolute; bottom: 0; right: 0; width: 120px; height: 50px; opacity: 0.5; }

/* CARDS, GRIDS */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
.card-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.chart-box { height: 300px; position: relative; }
.chart-box-sm { height: 220px; position: relative; }

/* TABLES */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { text-align: left; padding: 10px 12px; font-weight: 600; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted);
  border-bottom: 1px solid var(--border); }
.data-table td { padding: 10px 12px; border-bottom: 1px solid rgba(33,38,45,0.5); }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }

/* STATUS BADGES */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.badge-green { background: rgba(16,124,16,0.18); color: var(--green-light); }
.badge-yellow { background: rgba(255,185,0,0.18); color: var(--gold); }
.badge-red { background: rgba(232,17,35,0.18); color: var(--red); }
.badge-blue { background: rgba(0,120,212,0.18); color: var(--blue); }
.badge-purple { background: rgba(123,104,238,0.18); color: var(--purple); }
.badge-orange { background: rgba(255,140,0,0.18); color: var(--orange); }

/* PROGRESS BARS */
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

/* QBR CARDS */
.qbr-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px; border-left: 3px solid var(--green); }
.qbr-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.qbr-card p { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

/* WATERFALL COLORS */
.waterfall-up { background: var(--green); }
.waterfall-down { background: var(--red); }

/* RESPONSIVE */
@media (max-width: 1200px) { .kpi-hero-grid { grid-template-columns: repeat(2, 1fr); } .grid-3 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) {
  .sidebar { display: none; } .main { margin-left: 0; }
  .kpi-hero-grid { grid-template-columns: 1fr; } .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
}
</style>

const charts = {};

function destroyCharts() {
  Object.keys(charts).forEach(k => { if(charts[k]){charts[k].destroy();delete charts[k];} });
}

function fmt(v,pre='',suf='') { return pre+v+suf; }

function buildKPIHeroTiles(data) {
  return `<div class="kpi-hero-grid">${data.kpis.map((k,i) => `
    <div class="kpi-hero">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">
        <span class="kpi-delta ${k.up?'up':'down'}">${k.delta}</span>
        <span>vs prior year</span>
      </div>
      <div class="sparkline-container"><canvas id="spark-${i}"></canvas></div>
    </div>`).join('')}</div>`;
}

function renderSparklines(data, color) {
  data.kpis.forEach((k,i) => {
    const c = document.getElementById(`spark-${i}`);
    if(!c) return;
    charts[`spark-${i}`] = new Chart(c, {
      type:'line',
      data:{labels:MONTHS_SHORT,datasets:[{data:k.spark,borderColor:color,borderWidth:1.5,fill:true,
        backgroundColor:color+'20',pointRadius:0,tension:0.4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:false}},
        scales:{x:{display:false},y:{display:false}},animation:false}
    });
  });
}

function buildScorecardTable(data) {
  const rows = data.scorecard.map(r => `<tr>
    <td style="font-weight:600">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td>
    <td style="color:${r[4].startsWith('+') || r[4]==='New'?'var(--green-light)':'var(--red)'}">${r[4]}</td>
    <td>${r[5]}</td></tr>`).join('');
  return `<div class="card"><div class="card-title">📊 KPI Scorecard — Actual vs Target vs YoY</div>
    <div style="overflow-x:auto"><table class="data-table">
    <thead><tr><th>Metric</th><th>Actual</th><th>Target</th><th>Prior Year</th><th>YoY Δ</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

function buildExperimentsTable(data) {
  if(!data.experiments) return '';
  const rows = data.experiments.map(e => {
    const statusClass = e[5].includes('Active')?'badge-blue':e[5].includes('Shipped')?'badge-green':
      e[5].includes('Planning')?'badge-yellow':'badge-red';
    return `<tr>
      <td style="font-weight:600">${e[0]}</td>
      <td><span class="badge ${statusClass}">${e[5]}</span></td>
      <td>${e[2]}</td>
      <td style="color:${e[3].startsWith('+')?'var(--green-light)':'var(--red)'};font-weight:600">${e[3]}</td>
      <td style="font-weight:600">${e[4]}</td>
      <td><div class="progress-bar" style="width:80px"><div class="progress-fill" style="width:${e[6]}%;background:${e[6]===100?'var(--green)':e[6]>0?'var(--blue)':'var(--text-muted)'}"></div></div></td>

}

function renderRevenueBridge(data) {
  const c = document.getElementById('rev-bridge');
  if(!c) return;
  const rb = data.revBridge;
  // waterfall: floating bars
  const base = []; const vals = []; const colors = [];
  let running = 0;
  rb.values.forEach((v,i) => {
    if(i===0 || i===rb.values.length-1) { base.push(0); vals.push(v); }
    else { if(v>=0){base.push(running);vals.push(v);}else{base.push(running+v);vals.push(-v);} }
    running = (i===0) ? v : running + (i<rb.values.length-1 ? v : 0);
    colors.push(rb.colors[i]);
  });
  charts['rev-bridge'] = new Chart(c, {
    type:'bar',
    data:{
      labels:rb.labels,
      datasets:[
        {label:'Base',data:base,backgroundColor:'transparent',borderWidth:0,barPercentage:0.6},
        {label:'Change',data:vals,backgroundColor:colors,borderRadius:3,barPercentage:0.6},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        datalabels:{display:true,color:'#E6EDF3',font:{size:10,weight:600},anchor:'end',align:'top',
          formatter:(v,ctx)=>ctx.datasetIndex===1?(rb.values[ctx.dataIndex]>=0?'+':'')+'$'+rb.values[ctx.dataIndex]+'M':''}
      },
      scales:{
        x:{stacked:true,grid:{display:false},ticks:{color:'#8B949E',font:{size:10},maxRotation:45}},
        y:{stacked:true,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#8B949E',callback:v=>'$'+v+'M'}}
      }
    }
  });
}

  const rows = d.map(r => `<tr>
    <td style="font-weight:600">${r[0]}</td>
    <td style="color:var(--green-light)">${r[1]}</td>
    <td>${r[2]}</td><td>${r[3]}</td></tr>`).join('');
  return `<div class="card"><div class="card-title">⚔️ Competitive Benchmarking (Illustrative)</div>
    <div style="overflow-x:auto"><table class="data-table">
    <thead><tr><th>Metric</th><th style="color:var(--green)">Xbox</th><th>PlayStation</th><th>Nintendo</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

function buildQBR(tabId) {
  if(tabId !== 'total') return '';
  return `<div class="section"><div class="section-title">Quarterly Business Review Summary</div>
    <div class="grid-2">${D.total.qbr.map(q => `
      <div class="qbr-card" style="border-left-color:${q.border}">
        <h4>${q.title}</h4><p>${q.text}</p>
      </div>`).join('')}</div></div>`;
}

function buildRiskRegister(tabId) {
  if(tabId !== 'total') return '';
  const rows = D.total.risks.map(r => {
    const cls = r[4]==='🔴'?'badge-red':r[4]==='🟡'?'badge-yellow':'badge-green';
    return `<tr>
      <td style="font-weight:600">${r[0]}</td>
      <td><span class="badge ${cls}">${r[1]}</span></td>
      <td style="color:var(--text-dim)">${r[2]}</td>
      <td>${r[3]}</td></tr>`;
  }).join('');
  return `<div class="card"><div class="card-title">⚠️ Risk Register</div>
    <div style="overflow-x:auto"><table class="data-table">
    <thead><tr><th>Risk</th><th>Severity</th><th>Description</th><th>Mitigation</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

function buildInitiatives(tabId) {
  if(tabId !== 'total') return '';
  const rows = D.total.initiatives.map(r => {
    const cls = r[1]==='On Track'?'badge-green':r[1]==='At Risk'?'badge-yellow':'badge-red';
    return `<tr>
      <td style="font-weight:600">${r[0]}</td>
      <td><span class="badge ${cls}">${r[1]}</span></td>
      <td><div class="progress-bar" style="width:120px"><div class="progress-fill" style="width:${r[2]}%;background:${r[3]}"></div></div>
        <span style="font-size:10px;color:var(--text-dim);margin-left:6px">${r[2]}%</span></td>
      <td style="color:var(--text-dim)">${r[4]}</td></tr>`;
  }).join('');
  return `<div class="card"><div class="card-title">🚀 Strategic Initiatives Tracker</div>
    <div style="overflow-x:auto"><table class="data-table">
    <thead><tr><th>Initiative</th><th>Status</th><th>Progress</th><th>Next Milestone</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

function buildGrowthSection(data, tabId) {
  return `<div class="section"><div class="section-title">Growth</div>
    <div class="grid-2">
      <div class="card"><div class="card-title">📈 MAU & DAU Trend</div><div class="chart-box"><canvas id="growth-mau-${tabId}"></canvas></div></div>
      <div class="card"><div class="card-title">🌱 New User Acquisition</div><div class="chart-box"><canvas id="growth-acq-${tabId}"></canvas></div></div>
    </div></div>`;
}

function buildEngagementSection(data, tabId) {
  return `<div class="section"><div class="section-title">Engagement</div>
    <div class="grid-2">
      <div class="card"><div class="card-title">⏱️ Session Duration & Frequency</div><div class="chart-box"><canvas id="eng-sess-${tabId}"></canvas></div></div>
      <div class="card"><div class="card-title">📊 D7 & D30 Retention</div><div class="chart-box"><canvas id="eng-ret-${tabId}"></canvas></div></div>
    </div></div>`;
}

function buildMonetizationSection(data, tabId) {
  return `<div class="section"><div class="section-title">Monetization</div>
    <div class="grid-2">
      <div class="card"><div class="card-title">💰 ARPU & ARPPU</div><div class="chart-box"><canvas id="mon-arpu-${tabId}"></canvas></div></div>
      <div class="card"><div class="card-title">📈 Revenue Trend</div><div class="chart-box"><canvas id="mon-rev-${tabId}"></canvas></div></div>
    </div></div>`;
}

function buildRetentionSection(data, tabId) {
  return `<div class="section"><div class="section-title">Retention</div>
    <div class="grid-2">
      <div class="card"><div class="card-title">🔄 Retention Cohorts</div><div class="chart-box"><canvas id="ret-coh-${tabId}"></canvas></div></div>
      <div class="card"><div class="card-title">📉 Churn & LTV</div><div class="chart-box"><canvas id="ret-ltv-${tabId}"></canvas></div></div>
    </div></div>`;
}

function lineChart(id, datasets, yCallback) {
  const c = document.getElementById(id);
  if(!c) return;
  charts[id] = new Chart(c, {
    type:'line',
    data:{labels:MONTHS,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{color:'#8B949E',font:{size:11},boxWidth:12}},datalabels:{display:false}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#8B949E',font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#8B949E',font:{size:10},callback:yCallback||undefined}}
      }
    }
  });
}

function renderGrowthCharts(data, tabId) {
  lineChart(`growth-mau-${tabId}`, [
    {label:'MAU',data:data.mau,borderColor:'#107C10',backgroundColor:'rgba(16,124,16,0.1)',fill:true,tension:0.3,pointRadius:3},
    {label:'DAU',data:data.dau,borderColor:'#0078D4',backgroundColor:'rgba(0,120,212,0.1)',fill:true,tension:0.3,pointRadius:3},
  ]);
  lineChart(`growth-acq-${tabId}`, [
    {label:'Total New',data:data.growth.newUsers,borderColor:'#7FBA00',tension:0.3,pointRadius:3,borderWidth:2},
    {label:'Organic',data:data.growth.organic,borderColor:'#0078D4',tension:0.3,pointRadius:3,borderWidth:2},
    {label:'Paid',data:data.growth.paid,borderColor:'#FF8C00',tension:0.3,pointRadius:3,borderWidth:2},
    {label:'Viral',data:data.growth.viral,borderColor:'#7B68EE',tension:0.3,pointRadius:3,borderWidth:2},
  ]);
}

function renderEngagementCharts(data, tabId) {
  lineChart(`eng-sess-${tabId}`, [
    {label:'Sessions/User/Wk',data:data.engagement.sessions,borderColor:'#0078D4',tension:0.3,pointRadius:3,borderWidth:2,yAxisID:'y'},
    {label:'Avg Duration (min)',data:data.engagement.duration,borderColor:'#FF8C00',tension:0.3,pointRadius:3,borderWidth:2,yAxisID:'y1'},
  ]);
  // Override for dual axis
  const c = document.getElementById(`eng-sess-${tabId}`);
  if(c && charts[`eng-sess-${tabId}`]) {
    charts[`eng-sess-${tabId}`].options.scales.y1 = {
      position:'right',grid:{drawOnChartArea:false},ticks:{color:'#FF8C00',font:{size:10}}
    };
    charts[`eng-sess-${tabId}`].update();
  }
  lineChart(`eng-ret-${tabId}`, [
    {label:'D7 Retention',data:data.engagement.d7,borderColor:'#107C10',tension:0.3,pointRadius:3,borderWidth:2},
    {label:'D30 Retention',data:data.engagement.d30,borderColor:'#7B68EE',tension:0.3,pointRadius:3,borderWidth:2},
  ], v=>v+'%');
}

function renderMonetizationCharts(data, tabId) {
  lineChart(`mon-arpu-${tabId}`, [
    {label:'ARPU',data:data.monetization.arpu,borderColor:'#107C10',tension:0.3,pointRadius:3,borderWidth:2},
    {label:'ARPPU',data:data.monetization.arppu,borderColor:'#FFB900',tension:0.3,pointRadius:3,borderWidth:2},
  ], v=>'$'+v);
  lineChart(`mon-rev-${tabId}`, [
    {label:'Revenue',data:data.revenue,borderColor:'#7FBA00',backgroundColor:'rgba(127,186,0,0.12)',fill:true,tension:0.3,pointRadius:3,borderWidth:2},
  ]);
}

function renderRetentionCharts(data, tabId) {
  lineChart(`ret-coh-${tabId}`, [
    {label:'M1',data:data.retentionCohort.m1,borderColor:'#107C10',tension:0.3,pointRadius:3,borderWidth:2},
    {label:'M3',data:data.retentionCohort.m3,borderColor:'#0078D4',tension:0.3,pointRadius:3,borderWidth:2},
    {label:'M6',data:data.retentionCohort.m6,borderColor:'#FF8C00',tension:0.3,pointRadius:3,borderWidth:2},
    {label:'M12',data:data.retentionCohort.m12,borderColor:'#7B68EE',tension:0.3,pointRadius:3,borderWidth:2},
  ], v=>v+'%');
  lineChart(`ret-ltv-${tabId}`, [
    {label:'LTV ($)',data:data.monetization.ltv,borderColor:'#FFB900',tension:0.3,pointRadius:3,borderWidth:2},
    {label:'Conv Rate (%)',data:data.monetization.convRate,borderColor:'#E81123',tension:0.3,pointRadius:3,borderWidth:2},
  ]);
}

// ── TAB BUILDER ──
function renderTab(tabId) {
  destroyCharts();
  const data = D[tabId];
  if(!data) return;

  let html = `<div style="margin-bottom:20px">
    <h2 style="font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px">${data.label}</h2>
    <p style="font-size:12px;color:var(--text-dim)">Executive KPIs & Experiments — 12-month view (May 2025 – Apr 2026)</p>
  </div>`;

  // EXEC KPI TILES
  html += `<div class="section"><div class="section-title">Executive KPI Summary</div>${buildKPIHeroTiles(data)}</div>`;

  // SCORECARD
  html += `<div class="section"><div class="section-title">KPI Scorecard</div>${buildScorecardTable(data)}</div>`;

  // GOALS & TARGETS
  html += `<div class="section"><div class="section-title">Goals & Targets</div>${buildGoalsTargets(data, tabId)}</div>`;

  // EXPERIMENTS (total only)
  if(data.experiments) {
    html += `<div class="section"><div class="section-title">Experiments & A/B Tests</div>
      ${buildExperimentsTable(data)}
      ${buildExperimentTimeline(tabId)}</div>`;
  }

  // REVENUE BRIDGE (total only)
  html += buildRevenueBridge(tabId);

  // COMPETITIVE (total only)
  if(tabId === 'total') {
    html += `<div class="section"><div class="section-title">Competitive Landscape</div>${buildCompetitive(tabId)}</div>`;
  }

  // QBR (total only)
  html += buildQBR(tabId);

  // RISK REGISTER (total only)
  if(tabId === 'total') {
    html += `<div class="section"><div class="section-title">Risk Management</div>
      ${buildRiskRegister(tabId)}${buildInitiatives(tabId)}</div>`;
  }

  // GROWTH, ENGAGEMENT, MONETIZATION, RETENTION
  html += buildGrowthSection(data, tabId);
  html += buildEngagementSection(data, tabId);
  html += buildMonetizationSection(data, tabId);
  html += buildRetentionSection(data, tabId);

  document.getElementById('mainContent').innerHTML = html;

  // Render charts after DOM update
  requestAnimationFrame(() => {
    renderSparklines(data, data.color);
    renderGoalsChart(data, tabId);
    if(tabId === 'total') {
      renderExperimentTimeline();
      renderRevenueBridge(data);
    }
    renderGrowthCharts(data, tabId);
    renderEngagementCharts(data, tabId);
    renderMonetizationCharts(data, tabId);
    renderRetentionCharts(data, tabId);
  });
}

// ── NAV ──
document.querySelectorAll('.sidebar-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    renderTab(item.dataset.tab);
  });
});

// ── INIT ──
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
Chart.register(ChartDataLabels);
renderTab('total');
</script>
</body>
</html>
