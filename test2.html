<!DOCTYPE html>
<html><head>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
</head><body style="background:#0D1117;padding:50px">
<div style="background:#161B22;border-radius:10px;padding:16px;width:400px">
  <div style="position:relative;width:100%;height:240px" id="test-chart"></div>
</div>
<script>
Chart.register(ChartDataLabels);
Chart.defaults.plugins.datalabels={display:false};

var el = document.getElementById('test-chart');
var cv = document.createElement('canvas');
el.appendChild(cv);
var ch = new Chart(cv.getContext('2d'), {
  type: 'bar',
  data: {labels:['A','B','C','D','E','F','G','H','I','J','K','L'], 
    datasets:[
      {label:'Console', data:[64,65,66,67,68,69,70,71,72,73,74,75], backgroundColor:'#107C10', borderRadius:4, barPercentage:.7,
       datalabels:{display:function(ctx){var ds=ctx.chart.data.datasets.length;for(var d=ds-1;d>=0;d--){if(!ctx.chart.getDatasetMeta(d).hidden){return ctx.datasetIndex===d;}}return false;},anchor:'end',align:'top',offset:2,color:'#E6EDF3',font:{weight:'600',size:9},formatter:function(v,ctx){var total=0;ctx.chart.data.datasets.forEach(function(ds,di){if(!ctx.chart.getDatasetMeta(di).hidden){total+=Math.abs(ds.data[ctx.dataIndex]||0);}});return Math.round(total)+'M';}}},
      {label:'PC', data:[31,31.5,32,32.5,33,33.5,34,34.5,35,35.5,36,36.5], backgroundColor:'#0078D4', borderRadius:4, barPercentage:.7,
       datalabels:{display:function(ctx){var ds=ctx.chart.data.datasets.length;for(var d=ds-1;d>=0;d--){if(!ctx.chart.getDatasetMeta(d).hidden){return ctx.datasetIndex===d;}}return false;},anchor:'end',align:'top',offset:2,color:'#E6EDF3',font:{weight:'600',size:9},formatter:function(v,ctx){var total=0;ctx.chart.data.datasets.forEach(function(ds,di){if(!ctx.chart.getDatasetMeta(di).hidden){total+=Math.abs(ds.data[ctx.dataIndex]||0);}});return Math.round(total)+'M';}}},
      {label:'Cloud', data:[16,16.2,16.4,16.6,16.8,17,17.2,17.4,17.6,17.8,18,18.2], backgroundColor:'#7B68EE', borderRadius:4, barPercentage:.7,
       datalabels:{display:function(ctx){var ds=ctx.chart.data.datasets.length;for(var d=ds-1;d>=0;d--){if(!ctx.chart.getDatasetMeta(d).hidden){return ctx.datasetIndex===d;}}return false;},anchor:'end',align:'top',offset:2,color:'#E6EDF3',font:{weight:'600',size:9},formatter:function(v,ctx){var total=0;ctx.chart.data.datasets.forEach(function(ds,di){if(!ctx.chart.getDatasetMeta(di).hidden){total+=Math.abs(ds.data[ctx.dataIndex]||0);}});return Math.round(total)+'M';}}}
    ]
  },
  options: {responsive:true, maintainAspectRatio:false,
    plugins:{legend:{position:'top'},datalabels:{display:false}},
    scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,title:{display:true,text:'MAU (M)'}}}}
});
setTimeout(function(){
  document.title = 'bottom:'+ch.chartArea.bottom+' height:'+ch.chartArea.height;
}, 1000);
</script></body></html>
